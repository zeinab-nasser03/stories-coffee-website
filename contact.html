<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Stories Coffee</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation Bar --> 
     <header> 
        <nav class="navbar"> 
            <div class="logo"> 
                <i class="fas fa-mug-hot"></i> Stories Coffee 
            </div> 
            <ul class="nav-links"> 
                <li><a href="index.html">Home</a></li> 
                <li><a href="about.html">About</a></li> 
                <li><a href="contact.html">Contact</a></li> 
            </ul> 
        </nav> 
    </header>

    <!-- Contact Hero --> 
     <section class="contact-hero"> 
        <div class="contact-hero-content"> 
            <h1>Get In Touch</h1> 
            <p>We’d love to hear from you. Send us a message anytime.</p> 
        </div> 
     </section>

    <!-- Contact Section --> 
     <section class="contact-section"> 
        <div class="contact-container"> 
            <!-- Contact Info --> 
             <div class="contact-info"> 
                <h2>Contact Information</h2> 
                <p><i class="fas fa-phone"></i> +961 XX XXX XXX</p> 
                <p><i class="fas fa-envelope"></i> info@storiescoffee.com</p>
                <p><i class="fas fa-map-marker-alt"></i> Beirut, Lebanon</p> 
                <div class="contact-social"> 
                    <a href="#"><i class="fab fa-facebook-f"></i></a> 
                    <a href="#"><i class="fab fa-instagram"></i></a> 
                    <a href="#"><i class="fab fa-x-twitter"></i></a> 
                </div> 
            </div> 
            <!-- Contact Form --> 
             <div class="contact-form"> 
                <h2>Send Message</h2> 
                <form> 
                    <input type="text" placeholder="Your Name" required> 
                    <input type="email" placeholder="Your Email" required> 
                    <textarea placeholder="Your Message" rows="6" required></textarea> 
                    <button type="submit">Send Message</button> 
                </form> 
            </div> 
        </div> 
    </section>

    <!-- Footer -->
        <footer>
            <p>
                &copy; 2026 Stories Coffee. All Rights Reserved.
            </p>

            <div class="social-icons">
                <a href="#"><i class="fab fa-facebook-f"></i></a>
                <a href="#"><i class="fab fa-instagram"></i></a>
                <a href="#"><i class="fab fa-x-twitter"></i></a>
            </div>
        </footer>
    
</body>
</html>
